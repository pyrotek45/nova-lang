name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test – ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin

          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libgl1-mesa-dev libasound2-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Nova test suite
        if: matrix.os != 'windows-latest'
        shell: bash
        run: bash tests/run_tests.sh

      - name: Run Nova test suite (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: bash tests/run_tests.sh

      - name: Check version output
        shell: bash
        run: |
          VERSION=$(cargo run --release --target ${{ matrix.target }} -- version 2>&1)
          echo "Nova reports: $VERSION"
          echo "$VERSION" | grep -q "0.5.0-alpha" || { echo "ERROR: version mismatch"; exit 1; }
