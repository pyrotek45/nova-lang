name: Release

# ── Triggers ────────────────────────────────────────────────────
# 1. Push a tag like  v0.1.0  →  automatic release
# 2. Actions tab  →  "Run workflow"  →  manual release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0). Leave blank to use the branch HEAD."
        required: false

# ── Permissions ─────────────────────────────────────────────────
permissions:
  contents: write          # needed to create GitHub Releases

# ── Jobs ────────────────────────────────────────────────────────
jobs:
  build:
    name: Build – ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: nova
            asset: nova-linux-x86_64

          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            binary: nova
            asset: nova-macos-x86_64

          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            binary: nova
            asset: nova-macos-aarch64

          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: nova.exe
            asset: nova-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libgl1-mesa-dev libasound2-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  # ── Create a GitHub Release and attach all binaries ───────────
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.inputs.tag }}" ]]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Nova ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/nova-linux-x86_64/nova-linux-x86_64
            artifacts/nova-macos-x86_64/nova-macos-x86_64
            artifacts/nova-macos-aarch64/nova-macos-aarch64
            artifacts/nova-windows-x86_64.exe/nova-windows-x86_64.exe
